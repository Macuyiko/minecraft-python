name: pylink
main: com.macuyiko.pylink.PyLinkPlugin
version: 0.15
api-version: 1.19
description: PyLink loads Python scripts from folders and manages lifecycle commands.
author: Seppe "Macuyiko" vanden Broucke
commands:
  pylink:
    description: Manage Python script folders
    usage: /pylink load|unload|reload <script> | /pylink list
permissions:
  pylink.admin:
    default: op
    description: Players who can manage PyLink scripts
